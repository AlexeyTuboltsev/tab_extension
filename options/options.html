<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="../shared/container-form.css">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <h1>Container Tab Manager Settings</h1>
  <div id="main-view">
    <section>
      <h2>Saved Containers</h2>
      <div id="saved-list"></div>
      <p id="no-saved" class="muted">No saved containers yet. Save one from the toolbar popup.</p>
    </section>
    <section>
      <h2>Shared Providers</h2>
      <p class="hint">Payment and auth providers that always share context with the originating saved container. These apply to ALL saved containers automatically.</p>
      <table id="providers-table">
        <thead><tr><th>Domain / Pattern</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="add-form">
        <input type="text" id="provider-pattern" placeholder="e.g. paypal.* or stripe.com">
        <button id="add-provider">Add</button>
      </div>
      <p id="provider-error" class="error hidden"></p>
    </section>
  </div>
  <div id="detail-view" class="hidden">
    <div id="detail-form"></div>
  </div>
  <script src="../shared/constants.js"></script>
  <script src="../shared/match-pattern.js"></script>
  <script src="../shared/container-form.js"></script>
  <script src="options.js"></script>
</body>
</html>
