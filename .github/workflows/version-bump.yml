name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump Version & Open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Bump version in manifest.json
        run: |
          VERSION=$(node -p "
            const m = require('./manifest.json');
            const [major, minor, patch] = m.version.split('.').map(Number);
            '${{ inputs.bump }}' === 'major' ? (major+1)+'.0.0' :
            '${{ inputs.bump }}' === 'minor' ? major+'.'+(minor+1)+'.0' :
            major+'.'+minor+'.'+(patch+1);
          ")
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json','utf8'));
            m.version = '${VERSION}';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Bumped to $VERSION"

      - name: Create PR
        run: |
          BRANCH="chore/version-bump-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add manifest.json
          git commit -m "Bump version to ${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Bump version to ${VERSION}" \
            --body "Automated version bump (${{ inputs.bump }}) to ${VERSION}." \
            --head "$BRANCH" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
