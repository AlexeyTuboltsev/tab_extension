name: Sign & Release

on:
  workflow_dispatch:

jobs:
  sign:
    name: Build, Sign & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Read version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build .xpi
        run: |
          web-ext build \
            --source-dir . \
            --artifacts-dir ./artifacts \
            --ignore-files tests/ .github/ .claude/ node_modules/ package.json package-lock.json \
                           .gitignore .mcp.json .node-version .playwright-mcp/ \
                           fingerprint-check.html CLAUDE.md README.md build.sh todo.md \
            --overwrite-dest

      - name: Sign with Mozilla
        run: |
          web-ext sign \
            --source-dir . \
            --artifacts-dir ./artifacts \
            --api-key ${{ secrets.AMO_JWT_ISSUER }} \
            --api-secret ${{ secrets.AMO_JWT_SECRET }} \
            --channel unlisted \
            --ignore-files tests/ .github/ .claude/ node_modules/ package.json package-lock.json \
                           .gitignore .mcp.json .node-version .playwright-mcp/ \
                           fingerprint-check.html CLAUDE.md README.md build.sh todo.md
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Create GitHub Release
        run: |
          XPI=$(ls artifacts/*.xpi | head -1)
          gh release create "v$VERSION" "$XPI" \
            --title "v$VERSION" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
