<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="../shared/container-form.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Container form view -->
  <div id="form-view">
    <div id="form-container"></div>
    <div id="no-container" class="hidden">
      <div class="saved-message">No container (default)</div>
    </div>
  </div>

  <!-- List view -->
  <div id="list-view" class="hidden">
    <div class="list-top">
      <button id="btn-back" title="Back">&#8592;</button>
    </div>

    <div class="collapsible">
      <div class="collapsible-header" id="toggle-saved">
        <span class="triangle">&#9660;</span>
        <h3>Saved Containers</h3>
      </div>
      <div class="collapsible-body" id="saved-body">
        <div id="saved-list"></div>
        <p id="no-saved" class="muted hidden">No saved containers yet.</p>
      </div>
    </div>

    <div class="collapsible">
      <div class="collapsible-header" id="toggle-temp">
        <span class="triangle collapsed">&#9660;</span>
        <h3>Temp Containers</h3>
      </div>
      <div class="collapsible-body hidden" id="temp-body">
        <div id="temp-list"></div>
        <p id="no-temp" class="muted hidden">No temp containers.</p>
      </div>
    </div>

    <div class="providers-section">
      <h3>Shared Providers</h3>
      <div id="provider-list" class="provider-list"></div>
      <div class="provider-add">
        <input type="text" id="provider-input" placeholder="e.g. paypal.* or stripe.com">
        <button id="btn-add-provider">+</button>
      </div>
    </div>
  </div>

  <script src="../shared/constants.js"></script>
  <script src="../shared/match-pattern.js"></script>
  <script src="../shared/container-form.js"></script>
  <script src="popup.js"></script>
</body>
</html>
